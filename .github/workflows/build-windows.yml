name: Build Windows Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Clean macOS specific requirements
        run: |
          Get-Content requirement.txt | Where-Object { $_ -notmatch 'objc' } | Set-Content requirement.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt
          pip install pyinstaller scikit-learn

      - name: Build executable with PyInstaller
        run: |
          pyinstaller MonitorTracking.py --onedir

      - name: Compile Inno Setup Installer
        run: |
          iscc installer.iss
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v4.0"
          name: "Latest Windows Installer"
          files: Output/EyeHandTracker_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
